<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
  </head>
  <body>
    <a href="../index.html" target="_blank">HOME</a><br />
    <hr />
    <h1>Images</h1>
    <br />

    <h2>images with relative path</h2>
    <br />

    <img
      src="grstudios.png"
      alt="GR STUDIOS LOGO"
      width="300"
      height="200
    "
    /><br />

    <h2>images in same folder</h2>
    <br />

    <img
      src="grstudios.png"
      alt="GR STUDIOS LOGO"
      width="300"
      height="200
    "
    /><br />

    <h2>images in different folder</h2>
    <br />

    <img src="image/camera.jpg" alt="camera" /><br />

    <h2>going back on folder</h2>
    <br />

    <img
      src="../media/grstudios.png"
      alt="GR STUDIOS LOGO"
      width="300"
      height="200
    "
    /><br />

    <h2>images with absloute path</h2>
    <br />

    <img src="https://picsum.photos/200/300" alt="random" /><br />

    <h2>images with title</h2>
    <br />

    <img
      src="grstudios.png"
      alt="GR STUDIOS LOGO"
      title="it's gr studios logo"
      width="300"
      height="200"
    /><br />

    <h2>fig and figcaption</h2>
    <br />

    <figure>
      <img src="image/camera.jpg" alt="camera" />
      <figcaption>Fig.1 - its a DSLR camera</figcaption>
    </figure>

    <h2>loading lazy</h2>
    <br />

    <img
      src="grstudios.png"
      alt="logo"
      loading="lazy"
      height="200"
      width="300
    "
    /><br />
  </body>
</html>
